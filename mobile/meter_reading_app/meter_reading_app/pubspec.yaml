name: meter_reading_app
description: Enterprise offline-first mobile meter reading application (Odoo Utility ERP extension).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (offline-first source of truth)
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking (abstraction layer only in this phase — no live endpoints wired)
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Background sync
  workmanager: ^0.9.0+3

  # Security
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # Image capture & processing
  camera: ^0.10.6
  image: ^4.2.0

  # Navigation
  go_router: ^14.1.4

  # Identifiers
  uuid: ^4.4.0

  # UI
  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
